name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  LLM_PROVIDER: fake

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install backend
        run: pip install -e ".[dev]"
      - name: Ruff lint
        run: ruff check backend
      - name: mypy
        run: mypy
      - name: Unit tests (SQLite)
        env:
          DATABASE_URL: sqlite:///./data/generated/ci.db
        run: pytest -m "unit or security"

  integration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: lineageiq
          POSTGRES_PASSWORD: lineageiq
          POSTGRES_DB: lineageiq
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U lineageiq" --health-interval 5s
          --health-timeout 5s --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - name: Integration tests (Postgres)
        env:
          DATABASE_URL: postgresql+psycopg://lineageiq:lineageiq@localhost:5432/lineageiq
        run: pytest -m integration

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: docker build -f backend/Dockerfile -t lineageiq-backend .
      - name: Build frontend image
        run: docker build -f frontend/Dockerfile -t lineageiq-frontend ./frontend
